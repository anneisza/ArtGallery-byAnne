<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Profil — Art Gallery</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..700;1,400..700&family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        :root {
            --bg: #0a0a0f;
            --bg-glass: rgba(24, 24, 35, 0.45);
            --border: rgba(255, 255, 255, 0.08);
            --border-active: rgba(124, 58, 237, 0.4);
            --text: #e0e0f0;
            --text-muted: #94a3b8;
            --accent: #7c3aed;
            --accent-glow: rgba(124, 58, 237, 0.3);
        }
        body {             background-image: linear-gradient(rgba(10, 10, 15, 0.85), rgba(10, 10, 15, 0.85)),
                              url('https://images.unsplash.com/photo-1579783900882-c0d3dad7b119?q=80&w=1920');

            background-size: cover;           /* Memastikan gambar menutup seluruh layar */
            background-position: center;        /* Posisi gambar pas di tengah-tengah */
            background-attachment: fixed;      /* Kunci background agar tidak ikut tergulung saat di-scroll */ color: var(--text); font-family: 'Plus Jakarta Sans', sans-serif; display: flex; min-height: 100vh; }

        .sidebar { width: 240px; background: rgba(17, 17, 24, 0.85); backdrop-filter: blur(12px); border-right: 1px solid var(--border); padding: 2rem 0; display: flex; flex-direction: column; position: fixed; height: 100vh; z-index: 50; }
        .sidebar-brand { padding: 0 2rem 2.5rem; font-family: 'Playfair Display', serif; font-size: 1.25rem; font-weight: 700; letter-spacing: 2px; font-style: italic; color: var(--text); }
        .sidebar-section { padding: 0 1.5rem; font-size: 0.7rem; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.75rem; margin-top: 1.5rem; font-weight: 700; }
        .sidebar-menu { list-style: none; }
        .sidebar-menu a { display: block; padding: 0.75rem 2rem; color: var(--text-muted); text-decoration: none; font-size: 0.9rem; font-weight: 500; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .sidebar-menu a:hover, .sidebar-menu li.active a { color: var(--text); background: rgba(255, 255, 255, 0.05); border-left: 3px solid var(--accent); padding-left: 2.25rem; }

        .main-content { flex: 1; margin-left: 240px; padding: 3rem; animation: fadeInUp 0.6s cubic-bezier(0.4, 0, 0.2, 1); }
        .header { margin-bottom: 3rem; }
        .header h1 { font-family: 'Playfair Display', serif; font-size: 2.25rem; font-weight: 700; }
        .header h1 span { color: var(--accent); font-style: italic; }
        .header-subtitle { color: var(--text-muted); font-size: 0.9rem; margin-top: 0.5rem; }

        /* Avatar Luxury Element */
        .avatar {
            width: 70px; height: 70px; border-radius: 50%; background: linear-gradient(135deg, var(--accent), #4f6ef7); color: white; display: flex; align-items: center; justify-content: center; font-size: 1.75rem; font-family: 'Playfair Display', serif; font-weight: 700; margin-bottom: 2.5rem; box-shadow: 0 0 20px var(--accent-glow); border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .card { background: var(--bg-glass); backdrop-filter: blur(16px); border: 1px solid var(--border); border-radius: 12px; padding: 2rem; margin-bottom: 2rem; box-shadow: 0 20px 40px rgba(0, 0, 0, 0.3); }
        .card-title { font-family: 'Playfair Display', serif; font-size: 1.35rem; font-weight: 600; margin-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.5rem; }
        label { display: block; font-size: 0.85rem; font-weight: 600; margin-bottom: 0.5rem; color: var(--text); }
        input[type="text"], input[type="email"], input[type="password"] { width: 100%; padding: 0.75rem 1rem; background: rgba(255, 255, 255, 0.03); border: 1px solid var(--border); border-radius: 6px; color: var(--text); font-family: inherit; font-size: 0.9rem; transition: all 0.3s ease; }
        input:focus { outline: none; border-color: var(--accent); background: rgba(255, 255, 255, 0.06); box-shadow: 0 0 10px rgba(124, 58, 237, 0.2); }

        .btn { display: inline-flex; align-items: center; padding: 0.6rem 1.5rem; border-radius: 6px; font-size: 0.9rem; font-weight: 600; cursor: pointer; text-decoration: none; transition: all 0.2s ease; border: none; }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { opacity: 0.9; transform: translateY(-1px); box-shadow: 0 4px 12px var(--accent-glow); }

        @keyframes fadeInUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div th:replace="~{layout/dashboard-sidebar :: kurator-sidebar(active='profil')}"></div>

<div class="main-content">
    <div class="header">
        <h1>Pengaturan <span>Profil Pengguna</span></h1>
        <div class="header-subtitle">Kelola dan amankan konfigurasi informasi kredensial akun kurator Anda.</div>
    </div>

    <div class="avatar" th:text="${#strings.substring(user.name, 0, 1)}">K</div>

    <div class="card">
        <div class="card-title">Informasi Profil Publik</div>
        <form th:action="@{/kurator/profil/update}" method="post">
            <div class="form-group">
                <label>Nama Lengkap Resmi</label>
                <input type="text" name="name" th:value="${user.name}" required>
            </div>
            <div class="form-group">
                <label>Alamat Email Akses</label>
                <input type="email" name="email" th:value="${user.email}" required>
            </div>

            <input type="hidden" name="newPassword" value="">

            <button type="submit" class="btn btn-primary">Simpan Profil</button>
        </form>
    </div>

    <div class="card">
        <div class="card-title">Ubah Autentikasi / Kata Sandi</div>
        <form th:action="@{/kurator/profil/update}" method="post">
            <input type="hidden" name="name" th:value="${user.name}">
            <input type="hidden" name="email" th:value="${user.email}">

            <div class="form-group" style="max-width: 500px;">
                <label>Kata Sandi Baru</label>
                <input type="password" name="newPassword" placeholder="Biarkan kosong jika tidak berencana melakukan restrukturisasi kode akses">
            </div>
            <button type="submit" class="btn btn-primary">Ubah Kata Sandi Keamanan</button>
        </form>
    </div>
</div>
</body>
</html>
