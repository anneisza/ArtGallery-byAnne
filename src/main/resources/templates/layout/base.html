<!-- src/main/resources/templates/layout/base.html -->
<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      th:fragment="layout(title, content)">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:replace="${title}">Art Gallery</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --bg: #0a0a0f;
            --bg2: #111118;
            --bg3: #1a1a24;
            --border: #2a2a3a;
            --text: #e0e0f0;
            --text-muted: #8888aa;
            --accent: #4f6ef7;
            --accent2: #7c3aed;
            --green: #22c55e;
            --yellow: #eab308;
            --red: #ef4444;
        }
        body { background: var(--bg); color: var(--text); font-family: 'Segoe UI', sans-serif; }
        a { color: var(--accent); text-decoration: none; }
        a:hover { opacity: 0.8; }
        nav {
            display: flex; align-items: center; justify-content: space-between;
            padding: 1rem 3rem; background: var(--bg2);
            border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100;
        }
        .nav-brand { font-size: 1.1rem; font-weight: 700; letter-spacing: 2px; color: var(--text); }
        .nav-links { display: flex; gap: 2rem; align-items: center; }
        .nav-links a { color: var(--text-muted); font-size: 0.9rem; transition: color 0.2s; }
        .nav-links a:hover, .nav-links a.active { color: var(--text); }
        .btn {
            display: inline-block; padding: 0.5rem 1.2rem; border-radius: 6px;
            font-size: 0.85rem; font-weight: 600; cursor: pointer; border: none;
            transition: all 0.2s;
        }
        .btn-primary { background: var(--accent); color: white; }
        .btn-primary:hover { background: #3d5ce0; color: white; }
        .btn-success { background: var(--green); color: white; }
        .btn-danger { background: var(--red); color: white; }
        .btn-warning { background: var(--yellow); color: #111; }
        .btn-outline { background: transparent; border: 1px solid var(--border); color: var(--text-muted); }
        .btn-outline:hover { border-color: var(--accent); color: var(--accent); }
        footer {
            text-align: center; padding: 2rem; color: var(--text-muted);
            font-size: 0.8rem; border-top: 1px solid var(--border); margin-top: 4rem;
        }
    </style>
</head>
<body>
<th:block th:replace="${content}"/>
</body>
</html>
