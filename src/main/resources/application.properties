# src/main/resources/application.properties

spring.application.name=galeri-seni

# Database (Menggunakan Environment Variables untuk Railway & Lokal)
spring.datasource.url=jdbc:mysql://${SPRING_DATASOURCE_URL_HOST}:${SPRING_DATASOURCE_URL_PORT}/${SPRING_DATASOURCE_URL_DATABASE}?createDatabaseIfNotExist=true
spring.datasource.username=${SPRING_DATASOURCE_URL_USERNAME}
spring.datasource.password=${SPRING_DATASOURCE_URL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Pastikan Hibernate tidak menghapus tabel kamu setiap restart
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# Thymeleaf
spring.thymeleaf.cache=false
spring.thymeleaf.prefix=classpath:/templates/
spring.thymeleaf.suffix=.html

# File Upload
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# Server (WAJIB diganti agar Railway bisa menentukan Port secara dinamis)
server.port=${PORT:8081}